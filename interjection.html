<h2>INTERJECTIONS (EXAM PERFECT ANSWER)</h2>

<div class="card" style="width:100%; text-align:left;">

<h3>Definition</h3>
<p>An interjection is a word that expresses sudden feelings or emotions.</p>

<h3>Examples</h3>
<p>Wow! Hurrah! Oh! Alas!</p>

<h3>Uses</h3>
<p>Joy: Hurrah! We won.</p>
<p>Surprise: Wow! What a view.</p>
<p>Sadness: Alas! He is gone.</p>
