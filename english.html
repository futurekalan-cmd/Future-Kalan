.grid {

.card {

    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 120px;
}

.card button {
    background: #1e3a8a;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
}

.card button:hover {
    transform: scale(1.05);
}

@media (max-width:768px) {
    .grid {
        flex-direction: column;
        align-items: center;

}
