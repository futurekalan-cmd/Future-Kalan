<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Creative Notes - Future Kalan</title>

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ================= GENERAL ================= */
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    background: #f0f4f8;
}

/* ================= NAVBAR ================= */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: #1e3a8a;
    color: white;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    width: 40px;
    height: 40px;
}

.logo span {
    font-size: 20px;
    font-weight: 600;
}

.navbar nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
}

.navbar nav a:hover,
.navbar nav a.active {
    border-bottom: 2px solid #fff;
}

/* ================= MAIN ================= */
.container {
    max-width: 1200px;
    margin: auto;
    padding: 30px 20px;
}

h2 {
    text-align:center;
    margin-bottom:40px;
}

/* ================= NOTES ================= */
.notes {
    text-align: center;
}

.grid {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
}

.card {
    width: 220px;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 120px;
}

.card button {
    background: #1e3a8a;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
}

/* ================= FOOTER ================= */
footer {
    background: #1e3a8a;
    color: white;
    text-align: center;
    padding: 15px;
    margin-top: 40px;
}

.social-icons a {
    margin: 0 10px;
    color: white;
    font-size: 20px;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="logo">
        <img src="logo.png">
        <span>Future Kalan</span>
    </div>
    <nav>
        <a href="index.html">Home</a>
        <a href="notes.html">Notes</a>
        <a href="current.html">Current Affairs</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<!-- CONTENT -->
<div class="container">

<h2>Explore Our Notes</h2>

<section class="notes">
    <div class="grid">

        <div class="card">
            <img src="languages.png">
            <h3>📚 Languages</h3>
            <a href="languages.html"><button>View Course</button></a>
        </div>

        <div class="card">
            <img src="science.png">
            <h3>🔬 Science</h3>
            <a href="science.html"><button>View Course</button></a>
        </div>

        <div class="card">
            <img src="gk.png">
            <h3>🌍 GK / Current Affairs</h3>
            <a href="gk.html"><button>View Course</button></a>
        </div>
 <div class="card">
            <img src="computer.png">
            <h3>🔬 Computer </h3>
            <a href="computer.html"><button>View Course</button></a>
        </div>


    </div>
</section>

</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 Future Kalan | All Rights Reserved</p>

    <div class="social-icons">
        <a href="mailto:futurekalan@gmail.com"><i class="fa-solid fa-envelope"></i></a>
        <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="#"><i class="fa-brands fa-instagram"></i></a>
        <a href="#"><i class="fa-brands fa-youtube"></i></a>
    </div>
</footer>

</body>
</html>
